<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a1a2e">
<title>貳輪嶼內部查詢</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #f5f4f0; font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif; }

/* 首頁 */
#page-home {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
#home-header {
  background: #1a1a2e;
  padding: 20px 20px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}
#home-logo {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: #d85a30;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
#home-logo img { width: 38px; height: 38px; object-fit: contain; }
#home-header-text h1 { color: #fff; font-size: 17px; font-weight: 700; }
#home-header-text p { color: #8888aa; font-size: 11px; margin-top: 2px; }

#home-cards {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 32px 20px;
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
}
.home-card {
  border-radius: 20px;
  padding: 28px 22px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s, opacity 0.12s;
  text-align: center;
  -webkit-user-select: none;
}
.home-card:active { transform: scale(0.96); opacity: 0.85; }
.card-lookup {
  background: #111;
  border: 1.5px solid #333;
}
.card-search {
  background: #fff;
  border: 1.5px solid #e8e4dc;
  box-shadow: 0 3px 18px rgba(0,0,0,0.08);
}
.card-icon { font-size: 44px; line-height: 1; margin-bottom: 4px; }
.card-title-lookup { font-size: 20px; font-weight: 700; color: #fff; }
.card-title-search { font-size: 20px; font-weight: 700; color: #1a1a2e; }
.card-sub-lookup { font-size: 12px; color: #999; line-height: 1.7; }
.card-sub-search { font-size: 12px; color: #888; line-height: 1.7; }
.card-arrow-lookup { font-size: 24px; color: #d9ff00; margin-top: 6px; }
.card-arrow-search { font-size: 24px; color: #d85a30; margin-top: 6px; }

#home-footer { text-align: center; font-size: 11px; color: #bbb; padding: 10px 0 36px; }

/* iframe 容器 */
#page-iframe {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
  background: #fff;
}
#page-iframe iframe {
  width: 100%; height: 100%;
  border: none;
  display: block;
}
</style>
</head>
<body>

<!-- 首頁 -->
<div id="page-home">
  <div id="home-header">
    <div id="home-logo">
      <img id="home-logo-img" src="" alt="logo"/>
    </div>
    <div id="home-header-text">
      <h1>貳輪嶼內部專用查詢</h1>
      <p>MOTOR ISLAND</p>
    </div>
  </div>

  <div id="home-cards">
    <div class="home-card card-lookup" onclick="openApp('lookup')">
      <div class="card-icon">📍</div>
      <div class="card-title-lookup">門市地區查詢</div>
      <div class="card-sub-lookup">輸入客人所在地區<br>快速找到對應門市與交通資訊</div>
      <div class="card-arrow-lookup">›</div>
    </div>

    <div class="home-card card-search" onclick="openApp('search')">
      <div class="card-icon">🔍</div>
      <div class="card-title-search">線上車庫網址查詢</div>
      <div class="card-sub-search">依門市、年份、廠牌、車款條件<br>快速產生搜尋網址分享給客人</div>
      <div class="card-arrow-search">›</div>
    </div>
  </div>

  <div id="home-footer">貳輪嶼 Motor Island · 內部工具</div>
</div>

<!-- iframe 容器 -->
<div id="page-iframe">
  <iframe id="app-frame" src="" allow="clipboard-write"></iframe>
</div>

  document.getElementById('page-home').style.display = 'flex';
  document.getElementById('page-iframe').style.display = 'none';

</body>
</html>
